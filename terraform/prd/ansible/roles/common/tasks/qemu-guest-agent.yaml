---
- name: Install qemu-guest-agent
  become: true
  ansible.builtin.package:
    name: qemu-guest-agent
    state: present
  when: install_qemu_guest_agent | default(true)

- name: Start and enable qemu-guest-agent
  become: true
  ansible.builtin.systemd_service:
    name: qemu-guest-agent
    state: started
    enabled: true
  when: install_qemu_guest_agent | default(true)

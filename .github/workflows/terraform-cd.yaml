name: Terraform CD
on:
  push:
    branches:
      - main
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  find_envs:
    name: Find environments
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.output_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: output_matrix
        run: |
          echo "matrix=$(find ./terraform -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | jq -R -s -c 'split("\n") | map(select(length > 0)) | {env: .}')" >> $GITHUB_OUTPUT
  tf_apply:
    name: Apply Terraform
    permissions:
      pull-requests: write
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    needs: [ find_envs ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.find_envs.outputs.matrix) }}
    defaults:
      run:
        # https://docs.github.com/ja/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idstrategyfail-fast
        working-directory: terraform/${{ matrix.env }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          cli_config_credentials_token: ${{ secrets.TERRAFORM_CLOUD_API_TOKEN }}
      - uses: shmokmt/actions-setup-tfcmt@04d5aa6dc61eaa69a4d00257224c9b97f4857819 # v2.1.1
      - name: Terraform Format
        run: terraform fmt -check -recursive
      - name: Terraform Init
        run: terraform init
      - name: Terraform Validate
        run: terraform validate -no-color
      - name: Expose all Terraform variables to environment variables from secrets
        run: curl -fsSL https://raw.githubusercontent.com/GiganticMinecraft/seichi_infra/refs/heads/main/.github/workflows/scripts/expose-all-tf-vars-to-github-env.sh | bash
        env:
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
      - name: Setup Tailscale
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:gha
      - name: Terraform Plan
        run: terraform plan -input=false -no-color -lock-timeout=10m -out=tfplan_result
      - name: Terraform Apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TFCMT_CONFIG: ${{ github.workspace }}/.github/tfcmt-config.yaml
        run: tfcmt apply --config "$TFCMT_CONFIG" -- terraform apply -input=false -no-color -auto-approve -lock-timeout=10m tfplan_result

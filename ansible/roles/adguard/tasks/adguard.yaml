---
- name: adguard | Check if AdGuard Home binary exists
  ansible.builtin.stat:
    path: /opt/AdGuardHome/AdGuardHome
  register: __adguard_binary

- name: adguard | Install AdGuard Home binary
  when: not __adguard_binary.stat.exists
  block:
    - name: adguard | Download AdGuard Home archive
      ansible.builtin.get_url:
        url: "https://github.com/AdguardTeam/AdGuardHome/releases/download/v{{ adguard_version }}/AdGuardHome_linux_amd64.tar.gz"
        dest: /tmp/AdGuardHome.tar.gz
        mode: "0644"

    - name: adguard | Create install directory
      ansible.builtin.file:
        path: /opt/AdGuardHome
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: adguard | Extract AdGuard Home binary
      ansible.builtin.unarchive:
        src: /tmp/AdGuardHome.tar.gz
        dest: /opt/AdGuardHome
        remote_src: true
        extra_opts:
          - "--strip-components=2"
      notify: Restart AdGuardHome

    - name: adguard | Remove archive
      ansible.builtin.file:
        path: /tmp/AdGuardHome.tar.gz
        state: absent

- name: adguard | Deploy AdGuard Home service file
  ansible.builtin.copy:
    src: AdGuardHome.service
    dest: /etc/systemd/system/AdGuardHome.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart AdGuardHome

- name: adguard | Read existing AdGuard Home password hash
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - -c
      - |
        import yaml, sys
        try:
          config = yaml.safe_load(open('/opt/AdGuardHome/AdGuardHome.yaml'))
          print(config['users'][0]['password'])
        except Exception:
          print('')
  register: __adguard_existing_hash
  changed_when: false
  failed_when: false
  no_log: true

- name: adguard | Generate bcrypt hash for AdGuard Home admin password
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - -c
      - |
        import bcrypt, sys, json
        data = json.loads(sys.stdin.read())
        pw = data['password'].encode()
        existing = data['existing'].encode()
        if existing and bcrypt.checkpw(pw, existing):
          print(existing.decode())
        else:
          print(bcrypt.hashpw(pw, bcrypt.gensalt()).decode())
    stdin: "{{ {'password': adguard_admin_password, 'existing': __adguard_existing_hash.stdout} | to_json }}"
  register: __adguard_password_hash
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: adguard | Deploy AdGuard Home configuration
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: /opt/AdGuardHome/AdGuardHome.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Restart AdGuardHome

- name: adguard | Restore SELinux context on AdGuard Home directory
  ansible.builtin.command:
    cmd: restorecon -r /opt/AdGuardHome
  changed_when: false

- name: adguard | Enable and start AdGuard Home
  ansible.builtin.systemd_service:
    name: AdGuardHome
    daemon_reload: true
    enabled: true
    state: started


---
- name: Install MariaDB
  when: "'zabbix_server' in group_names or 'zabbix_server__single' in group_names"
  become: true
  ansible.builtin.package:
    name:
      - MariaDB-client
      - MariaDB-server
    state: present

# systemd に mariadb を操作させない
- name: Stop, disable and mask mariadb
  when: "'zabbix_server__ha' in group_names"
  become: true
  ansible.builtin.systemd_service:
    name: mariadb
    state: stopped
    enabled: false
    masked: true

---
- name: repos | Add HighAvailability JP mirrors
  ansible.builtin.blockinfile:
    path: /etc/yum.repos.d/almalinux-jp-mirrors.repo
    marker: "# {mark} ANSIBLE MANAGED - jp-highavailability"
    block: |
      [jp-highavailability]
      name=AlmaLinux {{ ansible_facts['distribution_major_version'] }} - HighAvailability (JP Mirrors)
      baseurl=http://ftp.jaist.ac.jp/pub/Linux/almalinux/$releasever/HighAvailability/$basearch/os/
             http://ftp.sakura.ad.jp/almalinux/$releasever/HighAvailability/$basearch/os/
             http://ftp.yz.yamagata-u.ac.jp/pub/linux/almalinux/$releasever/HighAvailability/$basearch/os/
             http://mirrors.xtom.jp/almalinux/$releasever/HighAvailability/$basearch/os/
             http://ftp.udx.icscoe.jp/Linux/almalinux/$releasever/HighAvailability/$basearch/os/
             http://ftp.iij.ad.jp/pub/linux/almalinux/$releasever/HighAvailability/$basearch/os/
             http://ftp.riken.jp/Linux/almalinux/$releasever/HighAvailability/$basearch/os/
      enabled=1
      gpgcheck=1
      gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-AlmaLinux-{{ ansible_facts['distribution_major_version'] }}
      module_hotfixes=1

- name: pacemaker | Install Pacemaker
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.package:
    name:
      - corosync
      - corosync-qdevice
      - pacemaker
      - pcs
    state: present

- name: pacemaker | Get latest fence_pve release info from GitHub
  when: "inventory_hostname in zabbix_server_ha_hosts"
  delegate_to: localhost
  ansible.builtin.uri:
    url: https://api.github.com/repos/clov3r-cc/fence-agents/releases/latest
  register: __zabbix_server_fence_pve_release

- name: pacemaker | Read installed fence_pve version
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.slurp:
    src: /usr/local/share/fence_pve_version
  register: __zabbix_server_fence_pve_version
  ignore_errors: true

- name: pacemaker | Install fence_pve binary
  when: >-
    inventory_hostname in zabbix_server_ha_hosts and
    (__zabbix_server_fence_pve_version.failed or
     (__zabbix_server_fence_pve_version.content | b64decode | trim) != __zabbix_server_fence_pve_release.json.tag_name)
  vars:
    __fence_pve_zip_url: "{{ (__zabbix_server_fence_pve_release.json.assets | selectattr('name', 'search', '\\.zip$') | first).browser_download_url }}"
    __fence_pve_local_zip: "/tmp/fence_pve_{{ __zabbix_server_fence_pve_release.json.tag_name }}.zip"
    __fence_pve_local_dir: "/tmp/fence_pve_{{ __zabbix_server_fence_pve_release.json.tag_name }}"
  block:
    - name: Download fence_pve zip to controller
      delegate_to: localhost
      ansible.builtin.get_url:
        url: "{{ __fence_pve_zip_url }}"
        dest: "{{ __fence_pve_local_zip }}"
        mode: "0644"

    - name: Create extraction directory on controller
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ __fence_pve_local_dir }}"
        state: directory
        mode: "0755"

    - name: Extract fence_pve on controller
      delegate_to: localhost
      ansible.builtin.unarchive:
        src: "{{ __fence_pve_local_zip }}"
        dest: "{{ __fence_pve_local_dir }}"
        include:
          - fence_pve

    - name: Copy fence_pve to server
      ansible.builtin.copy:
        src: "{{ __fence_pve_local_dir }}/fence_pve"
        dest: /usr/sbin/fence_pve
        mode: "0755"
        owner: root
        group: root
      notify: Restart pacemaker

    - name: Record installed fence_pve version
      ansible.builtin.copy:
        content: "{{ __zabbix_server_fence_pve_release.json.tag_name }}"
        dest: /usr/local/share/fence_pve_version
        mode: "0644"

- name: pacemaker | Set hacluster user password
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.user:
    name: hacluster
    password: "{{ zabbix_server_hacluster_password | password_hash('sha512') }}"
  changed_when: false

- name: pacemaker | Generate corosync authkey on first node
  when: "inventory_hostname in zabbix_server_ha_hosts and inventory_hostname == zabbix_server_ha_hosts[0]"
  ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && corosync-keygen
  args:
    creates: /etc/corosync/authkey
  check_mode: false
  register: __zabbix_server_generate_corosync_key
  failed_when: ansible_check_mode == false and __zabbix_server_generate_corosync_key.rc != 0

- name: pacemaker | Fetch authkey from first node
  when: "inventory_hostname in zabbix_server_ha_hosts and inventory_hostname == zabbix_server_ha_hosts[0]"
  ansible.builtin.fetch:
    src: /etc/corosync/authkey
    dest: /tmp/corosync-authkey
    flat: true

- name: pacemaker | Distribute authkey to all nodes
  when: "inventory_hostname in zabbix_server_ha_hosts and inventory_hostname != zabbix_server_ha_hosts[0]"
  ansible.builtin.copy:
    src: /tmp/corosync-authkey
    dest: /etc/corosync/authkey
    owner: root
    group: root
    mode: '0400'
  notify:
    - Restart corosync
    - Restart pacemaker

- name: pacemaker | Deploy corosync configuration
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.template:
    src: corosync.conf.j2
    dest: /etc/corosync/corosync.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Restart corosync
    - Restart pacemaker

- name: pacemaker | Enable and start corosync
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.systemd_service:
    name: corosync
    state: started
    enabled: true

- name: pacemaker | Enable and start pacemaker
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.systemd_service:
    name: pacemaker
    state: started
    enabled: true

# pcsd は使用しない
- name: pacemaker | Disable, stop and mask pcsd
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.systemd_service:
    name: pcsd
    state: stopped
    enabled: false
    masked: true

- name: pacemaker | Configure STONITH resource
  when: "inventory_hostname in zabbix_server_ha_hosts"
  pcs_resource:
    name: "fence-{{ item }}"
    resource_class: stonith
    resource_type: fence_pve
    options: >-
      ip="{{ zabbix_server_pve_stonith_ipaddr }}"
      username="root@pam"
      pve_api_token="{{ zabbix_server_pve_stonith_api_token }}"
      pve_api_token_secret="{{ zabbix_server_pve_stonith_api_token_secret }}"
      pve_node_auto="true"
      plug="{{ hostvars[item]['vm_id'] }}"
      vmtype="qemu"
      ssl_insecure="true"
      pcmk_reboot_action="reboot"
      delay="15"
      op monitor interval="60s" timeout="30s"
      meta target-role="Started" is-managed="true"
  loop: "{{ zabbix_server_ha_hosts }}"
  run_once: true

# STONITH must not run on its own node
- name: pacemaker | Add location constraint
  when: "inventory_hostname in zabbix_server_ha_hosts"
  pcs_constraint_location:
    resource: "fence-{{ item }}"
    node_name: "{{ item }}"
    score: "-INFINITY"
    constraint_id: "loc-fence-{{ item }}"
  loop: "{{ zabbix_server_ha_hosts }}"
  run_once: true

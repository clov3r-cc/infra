---
# www.elrepo.org が User-Agent なしのリクエストに 406 を返すため、
# rpm_key ではなく get_url で一度ダウンロードしてから読み込ませる。
- name: drbd | Download ELRepo GPG key
  environment:
    https_proxy: "{{ proxy_server_url }}"
  ansible.builtin.get_url:
    url: https://www.elrepo.org/RPM-GPG-KEY-v2-elrepo.org
    dest: /tmp/RPM-GPG-KEY-v2-elrepo.org
    mode: '0644'

- name: drbd | Add ELRepo GPG key
  ansible.builtin.rpm_key:
    key: /tmp/RPM-GPG-KEY-v2-elrepo.org
    state: present

# 公式 ELRepo リポジトリも mirrorlist は http:// のため合わせる。
- name: drbd | Add ELRepo repository
  ansible.builtin.yum_repository:
    name: elrepo
    description: ELRepo.org Community Enterprise Linux Repository
    mirrorlist: "http://mirrors.elrepo.org/mirrors-elrepo.el{{ ansible_facts['distribution_major_version'] }}"
    gpgkey: /etc/pki/rpm-gpg/RPM-GPG-KEY-v2-elrepo.org
    gpgcheck: true
    enabled: true

- name: drbd | Create a new ext4 primary partition
  when: "inventory_hostname in zabbix_server_ha_hosts"
  community.general.parted:
    device: /dev/vdb
    number: 1
    state: present
    label: gpt
    fs_type: ext4
    part_type: primary
    part_start: 0%
    part_end: 100%
    resize: false

- name: drbd | Install DRBD
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.package:
    name:
      - kmod-drbd9x
      - drbd9x-utils
    state: present

- name: drbd | Unmask drbd service
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.command: systemctl unmask drbd
  changed_when: false

- name: drbd | Enable and start drbd
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.systemd_service:
    name: drbd
    state: started
    enabled: true

- name: drbd | Deploy DRBD configuration
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.template:
    src: drbd1.res.j2
    dest: /etc/drbd.d/drbd1.res
    mode: '0644'

- name: drbd | Check if DRBD connection is configured
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.command: drbdadm cstate drbd1
  register: __zabbix_server_drbd_cstate
  check_mode: false
  failed_when: false
  changed_when: false

- name: drbd | Check if DRBD was previously initialized
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.stat:
    path: /etc/drbd.d/.drbd1-initialized
  register: __zabbix_server_drbd_initialized

- name: drbd | Initialize DRBD device metadata
  when:
    - inventory_hostname in zabbix_server_ha_hosts
    - __zabbix_server_drbd_cstate.rc != 0
    - not __zabbix_server_drbd_initialized.stat.exists
  ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && drbdadm create-md drbd1 --force
  check_mode: false
  register: __zabbix_server_init_drbd_dev_metadata
  failed_when: ansible_check_mode == false and __zabbix_server_init_drbd_dev_metadata.rc != 0
  changed_when: not ansible_check_mode

- name: drbd | Mark DRBD as initialized
  when:
    - inventory_hostname in zabbix_server_ha_hosts
    - not __zabbix_server_drbd_initialized.stat.exists
  ansible.builtin.file:
    path: /etc/drbd.d/.drbd1-initialized
    state: touch
    mode: '0644'

- name: drbd | Start DRBD device
  when: "inventory_hostname in zabbix_server_ha_hosts and __zabbix_server_drbd_cstate.rc != 0"
  ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && drbdadm up drbd1
  check_mode: false
  register: __zabbix_server_start_drbd_dev
  failed_when: ansible_check_mode == false and __zabbix_server_start_drbd_dev.rc != 0
  changed_when: not ansible_check_mode

- name: drbd | Wait for DRBD connection
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.command: drbdadm wait-connect drbd1
  check_mode: false
  changed_when: false

- name: drbd | Check if DRBD disk is synced
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.command: drbdadm dstate drbd1
  register: __zabbix_server_drbd_dstate
  check_mode: false
  failed_when: false
  changed_when: false

- name: drbd | Initial DRBD sync setup
  when:
    - inventory_hostname in zabbix_server_ha_hosts
    - __zabbix_server_drbd_dstate.stdout != 'UpToDate/UpToDate'
  block:
    - name: drbd | Make all nodes secondary
      ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && drbdadm secondary drbd1
      check_mode: false
      register: __zabbix_server_make_nodes_secondary
      failed_when: ansible_check_mode == false and __zabbix_server_make_nodes_secondary.rc != 0
      changed_when: not ansible_check_mode

    - name: drbd | Sync disk at first node
      when: inventory_hostname == zabbix_server_ha_hosts[0]
      ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && drbdadm primary drbd1 --force
      check_mode: false
      register: __zabbix_server_sync_disk
      failed_when: ansible_check_mode == false and __zabbix_server_sync_disk.rc != 0
      changed_when: not ansible_check_mode

    - name: drbd | Wait for DRBD sync
      ansible.builtin.command: drbdadm wait-sync drbd1
      check_mode: false
      changed_when: false

    - name: drbd | Check if filesystem exists on DRBD device
      when: inventory_hostname == zabbix_server_ha_hosts[0]
      ansible.builtin.command: blkid /dev/drbd1
      register: __zabbix_server_drbd_blkid
      check_mode: false
      failed_when: false
      changed_when: false

    - name: drbd | Create filesystem on DRBD device
      when:
        - inventory_hostname == zabbix_server_ha_hosts[0]
        - __zabbix_server_drbd_blkid.rc != 0
      community.general.filesystem:
        dev: /dev/drbd1
        state: present
        fstype: ext4
        resizefs: false

    # role の切り替えは、以降 mount / umount コマンドで自動で切り替わるので、このタスク以降実行不要
    - name: drbd | Make all nodes secondary
      ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && drbdadm secondary drbd1
      check_mode: false
      register: __zabbix_server_make_nodes_secondary
      failed_when: ansible_check_mode == false and __zabbix_server_make_nodes_secondary.rc != 0
      changed_when: not ansible_check_mode

- name: drbd | Create /mnt/drbd1 directory to use mount point
  when: "inventory_hostname in zabbix_server_ha_hosts"
  ansible.builtin.file:
    path: /mnt/drbd1
    state: directory
    mode: '0755'

# DRBD デバイスのマウントは Pacemaker が管理するためここでは実施しない

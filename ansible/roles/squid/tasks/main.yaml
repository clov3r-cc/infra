---
- name: Install required packages
  ansible.builtin.package:
    name:
      - squid
      - keepalived
    state: present

- name: Create keepalived directory
  ansible.builtin.file:
    path: /etc/keepalived
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy keepalived configuration
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart keepalived

- name: Enable and start keepalived
  ansible.builtin.systemd_service:
    name: keepalived
    state: started
    enabled: true

- name: Deploy squid configuration
  ansible.builtin.template:
    src: squid.conf.j2
    dest: /etc/squid/squid.conf
    owner: root
    group: squid
    mode: "0640"
  notify: Restart squid

- name: Initialize squid cache directory
  ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && squid -z
  args:
    creates: "{{ squid_cache_dir }}/swap.state"
  check_mode: false
  register: __squid_init_cache
  failed_when: ansible_check_mode == false and __squid_init_cache.rc != 0
  changed_when: not ansible_check_mode

- name: Enable and start squid
  ansible.builtin.systemd_service:
    name: squid
    daemon_reload: true
    enabled: true
    state: started

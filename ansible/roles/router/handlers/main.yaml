---
- name: Reload nftables
  become: true
  ansible.builtin.systemd_service:
    name: nftables
    state: reloaded

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Reload systemd-networkd
  become: true
  ansible.builtin.systemd_service:
    name: systemd-networkd
    state: reloaded

- name: Restart systemd-resolved
  become: true
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted

- name: Restart keepalived
  become: true
  ansible.builtin.systemd_service:
    name: keepalived
    state: restarted

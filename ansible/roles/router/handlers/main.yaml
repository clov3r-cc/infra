---
- name: Reload nftables
  ansible.builtin.systemd_service:
    name: nftables
    state: reloaded

- name: Reload systemd daemon
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Reload systemd-networkd
  ansible.builtin.systemd_service:
    name: systemd-networkd
    state: reloaded

- name: Restart dnsmasq
  ansible.builtin.systemd_service:
    name: dnsmasq
    state: restarted

- name: Restart keepalived
  ansible.builtin.systemd_service:
    name: keepalived
    state: restarted


---
- name: Install dnsmasq
  become: true
  ansible.builtin.package:
    name: dnsmasq
    state: present

- name: Deploy dnsmasq configuration
  become: true
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.d/router.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart dnsmasq

- name: Deploy dnsmasq nftset configuration
  become: true
  ansible.builtin.template:
    src: dnsmasq-nftset.conf.j2
    dest: /etc/dnsmasq.d/nftset.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart dnsmasq

- name: Stop and disable systemd-resolved
  become: true
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: stopped
    enabled: false

- name: Remove resolved DNS config drop-in
  become: true
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d/dns.conf
    state: absent

- name: Remove resolved stub-extra drop-in
  become: true
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d/stub-extra.conf
    state: absent

- name: Remove networkd DNS scope drop-ins
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/network/10-netplan-{{ item }}.network.d"
    state: absent
  loop:
    - eth1
    - eth2
    - eth3

- name: Set /etc/resolv.conf to use dnsmasq
  become: true
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 127.0.0.1
    owner: root
    group: root
    mode: "0644"

- name: Enable and start dnsmasq
  become: true
  ansible.builtin.systemd_service:
    name: dnsmasq
    state: started
    enabled: true

---
- name: nftables | Deploy nftables configuration
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0600"
    validate: nft -c -f %s
  notify: Reload nftables

- name: nftables | Deploy nftset warmup script
  ansible.builtin.template:
    src: nftset-warmup.sh.j2
    dest: /usr/local/sbin/nftset-warmup
    owner: root
    group: root
    mode: "0700"

- name: nftables | Deploy nftset-warmup systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/nftset-warmup.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Refresh nftables domain group sets

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/nftset-warmup
  notify: Reload systemd daemon

- name: nftables | Deploy nftset-warmup systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/nftset-warmup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Periodically refresh nftables domain group sets

      [Timer]
      OnBootSec=1min
      OnUnitActiveSec=30min

      [Install]
      WantedBy=timers.target
  notify: Reload systemd daemon

- name: nftables | Enable and start nftset-warmup timer
  ansible.builtin.systemd_service:
    name: nftset-warmup.timer
    state: started
    enabled: true

---
- name: Check if lego binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/lego
  register: __lego_binary

- name: Install lego
  when: not __lego_binary.stat.exists
  block:
    - name: lego | Download lego archive
      ansible.builtin.get_url:
        url: "https://github.com/go-acme/lego/releases/download/v{{ lego_version }}/lego_v{{ lego_version }}_linux_amd64.tar.gz"
        dest: /tmp/lego.tar.gz
        mode: "0644"

    - name: lego | Extract lego binary
      ansible.builtin.unarchive:
        src: /tmp/lego.tar.gz
        dest: /usr/local/bin
        remote_src: true
        include:
          - lego

    - name: lego | Remove archive
      ansible.builtin.file:
        path: /tmp/lego.tar.gz
        state: absent

    - name: lego | Restore SELinux context on lego binary
      ansible.builtin.command:
        cmd: restorecon -v /usr/local/bin/lego
      changed_when: false

- name: Create lego directory
  ansible.builtin.file:
    path: "{{ lego_path }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy lego environment file
  ansible.builtin.template:
    src: lego-env.j2
    dest: "{{ lego_path }}/lego.env"
    owner: root
    group: root
    mode: "0600"

- name: Check if certificate already exists
  ansible.builtin.stat:
    path: "{{ lego_path }}/certificates/{{ lego_domain }}.crt"
  register: __lego_cert

- name: Obtain initial certificate
  ansible.builtin.shell:
    cmd: >-
      /usr/local/bin/lego
      --path {{ lego_path }}
      --email {{ lego_email }}
      --dns {{ lego_dns_provider }}
      --domains {{ lego_domain }}
      --accept-tos
      run
    executable: /bin/bash
  environment:
    CF_DNS_API_TOKEN: "{{ lego_cloudflare_api_token }}"
  when: not __lego_cert.stat.exists
  changed_when: true
  notify:
    - Reload nginx
    - Restart AdGuardHome

- name: Deploy lego renew systemd service
  ansible.builtin.template:
    src: lego-renew.service.j2
    dest: /etc/systemd/system/lego-renew.service
    owner: root
    group: root
    mode: "0644"

- name: Deploy lego renew systemd timer
  ansible.builtin.copy:
    src: lego-renew.timer
    dest: /etc/systemd/system/lego-renew.timer
    owner: root
    group: root
    mode: "0644"

- name: Deploy lego-renew logrotate config
  ansible.builtin.copy:
    src: lego-renew.logrotate
    dest: /etc/logrotate.d/lego-renew
    owner: root
    group: root
    mode: "0644"

- name: Enable and start lego renew timer
  ansible.builtin.systemd_service:
    name: lego-renew.timer
    daemon_reload: true
    enabled: true
    state: started

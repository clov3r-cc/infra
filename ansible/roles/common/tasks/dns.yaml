---
- name: Configure DNS nameservers (NetworkManager)
  become: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - dns_nameservers is defined
  community.general.nmcli:
    conn_name: "cloud-init eth0"
    type: ethernet
    dns4: "{{ dns_nameservers }}"
    dns4_ignore_auto: true
    state: present
  notify: Reload NetworkManager connection eth0

- name: Stop and disable systemd-resolved (Debian)
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - dns_nameservers is defined
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: stopped
    enabled: false
    masked: true

- name: Set static /etc/resolv.conf (Debian)
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - dns_nameservers is defined
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      {% for ns in dns_nameservers %}
      nameserver {{ ns }}
      {% endfor %}
    owner: root
    group: root
    mode: "0644"

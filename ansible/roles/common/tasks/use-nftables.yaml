---
- name: use-nftables | Gather service facts
  ansible.builtin.service_facts:

- name: use-nftables | Stop and disable firewalld
  when: "'firewalld.service' in ansible_facts['services']"
  ansible.builtin.systemd_service:
    name: firewalld
    state: stopped
    enabled: false
    masked: true

- name: use-nftables | Install nftables
  ansible.builtin.package:
    name: nftables
    state: present

- name: use-nftables | Start and enable nftables
  ansible.builtin.systemd_service:
    name: nftables
    state: started
    enabled: true
    masked: false

---
- name: disable-swap | Check if swap is enabled
  ansible.builtin.command: swapon -v
  register: __common_swap_state
  check_mode: false
  failed_when: false
  changed_when: false

- name: disable-swap | Disable swap with command
  when: __common_swap_state.stdout != ""
  ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && swapoff -a
  check_mode: false
  register: __common_disable_swap_cmd
  failed_when: ansible_check_mode == false and __common_disable_swap_cmd.rc != 0
  changed_when: not ansible_check_mode

- name: disable-swap | Check if swap is enabled in /etc/fstab
  ansible.builtin.shell: grep -E '^[^#].*\sswap\s' /etc/fstab
  register: __common_swap_state_in_fstab
  check_mode: false
  failed_when: false
  changed_when: false

- name: disable-swap | Comment out swap entry in /etc/fstab
  when: __common_swap_state_in_fstab.stdout != ''
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

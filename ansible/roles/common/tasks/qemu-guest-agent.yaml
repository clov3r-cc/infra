---
- name: qemu-guest-agent | Install qemu-guest-agent
  ansible.builtin.package:
    name: qemu-guest-agent
    state: present
  when: install_qemu_guest_agent | default(true)

- name: qemu-guest-agent | Start and enable qemu-guest-agent
  ansible.builtin.systemd_service:
    name: qemu-guest-agent
    state: started
    enabled: true
  when: install_qemu_guest_agent | default(true)

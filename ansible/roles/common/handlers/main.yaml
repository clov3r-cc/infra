---
- name: Restart systemd-timesyncd
  become: true
  ansible.builtin.systemd_service:
    name: systemd-timesyncd
    state: restarted

- name: Restart chronyd
  become: true
  ansible.builtin.systemd_service:
    name: chronyd
    state: restarted

- name: Reload NetworkManager connection eth0
  become: true
  ansible.builtin.command: nmcli con up "cloud-init eth0"
  changed_when: true

- name: Restart systemd-resolved
  become: true
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted

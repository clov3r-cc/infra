---
- name: Restart systemd-timesyncd
  ansible.builtin.systemd_service:
    name: systemd-timesyncd
    state: restarted

- name: Restart chronyd
  ansible.builtin.systemd_service:
    name: chronyd
    state: restarted

- name: Reload NetworkManager connection eth0
  ansible.builtin.shell: test {{ ansible_check_mode | lower }} = false && nmcli con up "cloud-init eth0"
  check_mode: false
  changed_when: not ansible_check_mode


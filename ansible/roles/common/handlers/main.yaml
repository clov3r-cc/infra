---
- name: Restart systemd-timesyncd
  ansible.builtin.systemd_service:
    name: systemd-timesyncd
    state: restarted

- name: Restart chronyd
  ansible.builtin.systemd_service:
    name: chronyd
    state: restarted

- name: Reload NetworkManager connection eth0
  ansible.builtin.command: nmcli con up "cloud-init eth0"
  changed_when: true


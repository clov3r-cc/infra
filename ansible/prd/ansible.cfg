[defaults]
# Disable implicit Gathering Facts
gathering=explicit
host_key_checking=false
vault_password_file=./files/get_vault_password.sh

[privilege_escalation]
# -H: sudo実行時にHOMEをrootのホームディレクトリに設定する
# -S: パスワードを標準入力から読み込む（Ansibleがプログラム的にパスワードを渡せるようにするため）
become_flags = -H -S

[ssh_connection]
ssh_args = -o ServerAliveInterval=120 -o TCPKeepAlive=yes -o ForwardAgent=yes

[persistent_connection]
ssh_type = libssh

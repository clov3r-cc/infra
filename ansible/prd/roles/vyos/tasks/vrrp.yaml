---
- name: Configure VRRP HA global parameters
  vyos.vyos.vyos_config:
    lines:
      - set high-availability vrrp global-parameters version 3
    save: false

- name: Configure VRRP HA groups
  vyos.vyos.vyos_config:
    lines:
      - set high-availability vrrp group {{ item.name }} vrid {{ item.vrid }}
      - set high-availability vrrp group {{ item.name }} interface {{ item.interface }}
      - set high-availability vrrp group {{ item.name }} address {{ item.address }}
      - set high-availability vrrp group {{ item.name }} priority {{ vyos_vrrp_priority }}
      - set high-availability vrrp group {{ item.name }} preempt-delay {{ vyos_vrrp_preempt_delay }}
      - set high-availability vrrp group {{ item.name }} track interface {{ vyos_vrrp_track_interface }}
      - set high-availability vrrp sync-group {{ vyos_vrrp_sync_group }} member {{ item.name }}
    save: false
  loop: "{{ vyos_vrrp_groups }}"

- name: Check VRRP state
  vyos.vyos.vyos_command:
    commands:
      - show vrrp
  register: vrrp_result


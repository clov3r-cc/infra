---
fw_rulesets:
  - name: WAN-TO-LOCAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow VRRP from FW_WAN_NODES
        protocol: "112"
        source:
          address_group: FW_WAN_NODES
      - number: 20
        action: accept
        description: Allow ICMP from HOME_CLIENTS to FW_WAN_NODES
        protocol: icmp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: FW_WAN_NODES
      - number: 21
        action: accept
        description: Allow ICMP from HOME_CLIENTS to FW_WAN_VIP
        protocol: icmp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: FW_WAN_VIP
      - number: 30
        action: accept
        description: Allow UDP traceroute from HOME_CLIENTS to FW_WAN_NODES
        protocol: udp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: FW_WAN_NODES
          port: 33434-33534
      - number: 31
        action: accept
        description: Allow UDP traceroute from HOME_CLIENTS to FW_WAN_VIP
        protocol: udp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: FW_WAN_VIP
          port: 33434-33534
      - number: 100
        action: accept
        description: Allow SSH from HOME_CLIENTS to FW_WAN_NODES
        protocol: tcp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: FW_WAN_NODES
          port: 22

  - name: WAN-TO-DMZ
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow ICMP from HOME_CLIENTS to TAILSCALE_NODES
        protocol: icmp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: TAILSCALE_NODES
      - number: 20
        action: accept
        description: Allow UDP traceroute from HOME_CLIENTS to TAILSCALE_NODES
        protocol: udp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: TAILSCALE_NODES
          port: 33434-33534
      - number: 100
        action: accept
        description: Allow SSH from HOME_CLIENTS to TAILSCALE_NODES
        protocol: tcp
        source:
          network_group: HOME_CLIENTS
        destination:
          address_group: TAILSCALE_NODES
          port: 22

  - name: DMZ-TO-WAN
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow Tailscale control/DERP (TCP 443)
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          port: 443
      - number: 11
        action: accept
        description: Allow Proxmox API (TCP 8006) from TAILSCALE_NODES to PVE_NODES
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: PVE_NODES
          port: 8006
      - number: 12
        action: accept
        description: Allow SSH (TCP 22) from TAILSCALE_NODES to PVE_NODES
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: PVE_NODES
          port: 22
      - number: 20
        action: accept
        description: Allow Tailscale WireGuard tunnel (UDP 41641)
        protocol: udp
        source:
          address_group: TAILSCALE_NODES
          port: 41641
      - number: 30
        action: accept
        description: Allow Tailscale STUN (UDP 3478)
        protocol: udp
        source:
          address_group: TAILSCALE_NODES
        destination:
          port: 3478
      - number: 40
        action: accept
        description: Allow HTTPS to AlmaLinux mirrors from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: ALMALINUX_MIRRORS
          port: "80,443"
      - number: 41
        action: accept
        description: Allow HTTPS to ELRepo mirrors from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: ELREPO_MIRRORS
          port: "80,443"
      - number: 42
        action: accept
        description: Allow HTTPS to COPR from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: COPR
          port: 443
      - number: 43
        action: accept
        description: Allow HTTPS to AdGuard updates from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: ADGUARD
          port: 443
      - number: 44
        action: accept
        description: Allow HTTPS to GitHub from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: GITHUB
          port: 443
      - number: 45
        action: accept
        description: Allow HTTPS to Let's Encrypt ACME from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: LETSENCRYPT
          port: 443
      - number: 46
        action: accept
        description: Allow HTTPS to Cloudflare API from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: CLOUDFLARE_API
          port: 443
      - number: 47
        action: accept
        description: Allow HTTPS to easylist.to from DNS_SERVERS
        protocol: tcp
        source:
          address_group: DNS_SERVERS
        destination:
          domain_group: EASYLIST
          port: 443
      - number: 50
        action: accept
        description: Allow DNS from DNS_SERVERS to Cloudflare for SSL cert renewal DNS challenge
        protocol: tcp_udp
        source:
          address_group: DNS_SERVERS
        destination:
          network_group: CLOUDFLARE_IPS
          port: 53
      - number: 950
        action: drop
        description: Silently drop Tailscale captive portal probe (TCP 80) to DERP domains
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          domain_group: TAILSCALE_DERP_CAPTIVE
          port: 80

  - name: DMZ-TO-LOCAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow VRRP from FW_DMZ_NODES
        protocol: "112"
        source:
          address_group: FW_DMZ_NODES
      - number: 20
        action: accept
        description: Allow ICMP from TAILSCALE_NODES to FW_DMZ_NODES
        protocol: icmp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: FW_DMZ_NODES
      - number: 30
        action: accept
        description: Allow UDP traceroute from TAILSCALE_NODES to FW_DMZ_NODES
        protocol: udp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: FW_DMZ_NODES
          port: 33434-33534
      - number: 100
        action: accept
        description: Allow SSH from TAILSCALE_NODES to FW_DMZ_NODES
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: FW_DMZ_NODES
          port: 22
      - number: 200
        action: accept
        description: Allow NTP from TAILSCALE_NODES to FW_DMZ_VIP
        protocol: udp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: FW_DMZ_VIP
          port: 123
      - number: 201
        action: accept
        description: Allow NTP from DNS_SERVERS to FW_DMZ_VIP
        protocol: udp
        source:
          address_group: DNS_SERVERS
        destination:
          address_group: FW_DMZ_VIP
          port: 123
      - number: 210
        action: accept
        description: Allow DNS from TAILSCALE_NODES to FW_DMZ_VIP
        protocol: tcp_udp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: FW_DMZ_VIP
          port: 53
      - number: 211
        action: accept
        description: Allow DNS from DNS_SERVERS to FW_DMZ_VIP
        protocol: tcp_udp
        source:
          address_group: DNS_SERVERS
        destination:
          address_group: FW_DMZ_VIP
          port: 53
      - number: 950
        action: drop
        description: Silently drop NAT-PMP from TAILSCALE_NODES
        protocol: udp
        source:
          address_group: TAILSCALE_NODES
        destination:
          port: 5351
      - number: 951
        action: drop
        description: Silently drop UPnP/SSDP from TAILSCALE_NODES
        protocol: udp
        source:
          address_group: TAILSCALE_NODES
        destination:
          port: 1900

  - name: DMZ-TO-INTERNAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow ICMP from TAILSCALE_NODES to NAS_SERVERS
        protocol: icmp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: NAS_SERVERS
      - number: 15
        action: accept
        description: Allow UDP traceroute from TAILSCALE_NODES to NAS_SERVERS
        protocol: udp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: NAS_SERVERS
          port: 33434-33534
      - number: 20
        action: accept
        description: Allow SSH from TAILSCALE_NODES to ZABBIX_SERVERS
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: ZABBIX_SERVERS
          port: 22
      - number: 30
        action: accept
        description: Allow SSH from TAILSCALE_NODES to ACCESS_SWITCHES
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: ACCESS_SWITCHES
          port: 22
      - number: 40
        action: accept
        description: Allow TCP/9999 from TAILSCALE_NODES to NAS_SERVERS
        protocol: tcp
        source:
          address_group: TAILSCALE_NODES
        destination:
          address_group: NAS_SERVERS
          port: 9999

  - name: INTERNAL-TO-WAN
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow ICMP to WAN from NAS_SERVERS
        protocol: icmp
        source:
          address_group: NAS_SERVERS
      - number: 200
        action: accept
        description: Allow HTTPS to api-aar.ugnas.com from NAS_SERVERS
        protocol: tcp
        source:
          address_group: NAS_SERVERS
        destination:
          port: 443
  - name: INTERNAL-TO-DMZ
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow DNS from ZABBIX_SERVERS to DNS_SERVERS
        protocol: tcp_udp
        source:
          address_group: ZABBIX_SERVERS
        destination:
          address_group: DNS_SERVERS
          port: 53
      - number: 11
        action: accept
        description: Allow DNS from NAS_SERVERS to DNS_SERVERS
        protocol: tcp_udp
        source:
          address_group: NAS_SERVERS
        destination:
          address_group: DNS_SERVERS
          port: 53
      - number: 20
        action: accept
        description: Allow HTTPS to DNS_SERVERS for repo mirror from ZABBIX_SERVERS
        protocol: tcp
        source:
          address_group: ZABBIX_SERVERS
        destination:
          address_group: DNS_SERVERS
          port: 443

  - name: INTERNAL-TO-LOCAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow NTP from ZABBIX_SERVERS to FW_INTERNAL_VIP
        protocol: udp
        source:
          address_group: ZABBIX_SERVERS
        destination:
          address_group: FW_INTERNAL_VIP
          port: 123
      - number: 20
        action: accept
        description: Allow NTP from NAS_SERVERS to FW_INTERNAL_VIP
        protocol: udp
        source:
          address_group: NAS_SERVERS
        destination:
          address_group: FW_INTERNAL_VIP
          port: 123
      - number: 950
        action: drop
        description: Silently drop NetBIOS Name Service broadcast from NAS_SERVERS
        protocol: udp
        source:
          address_group: NAS_SERVERS
        destination:
          port: 137
      - number: 951
        action: drop
        description: Silently drop NetBIOS Datagram broadcast from NAS_SERVERS
        protocol: udp
        source:
          address_group: NAS_SERVERS
        destination:
          port: 138

  - name: LOCAL-TO-WAN
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow NTP to WAN_GATEWAY
        protocol: udp
        destination:
          address_group: WAN_GATEWAY
          port: 123
      - number: 20
        action: accept
        description: Allow DNS to WAN_GATEWAY
        protocol: tcp_udp
        destination:
          address_group: WAN_GATEWAY
          port: 53
      - number: 30
        action: accept
        description: Allow HTTPS to GitHub for image download
        protocol: tcp
        destination:
          domain_group: GITHUB
          port: 443
      - number: 35
        action: accept
        description: Allow HTTPS to Debian mirrors for apt
        protocol: tcp
        destination:
          domain_group: DEBIAN_MIRRORS
          port: 443
      - number: 40
        action: accept
        description: Allow ICMP to WAN
        protocol: icmp
      - number: 45
        action: accept
        description: Allow UDP traceroute to WAN
        protocol: udp
        destination:
          port: 33434-33534
      - number: 50
        action: accept
        description: Allow VRRP to FW_WAN_NODES
        protocol: "112"
        destination:
          address_group: VRRP_MULTICAST

  - name: LOCAL-TO-DMZ
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow VRRP to FW_DMZ_NODES
        protocol: "112"
        destination:
          address_group: VRRP_MULTICAST
      - number: 20
        action: accept
        description: Allow ICMP to DMZ
        protocol: icmp
      - number: 25
        action: accept
        description: Allow UDP traceroute to DMZ
        protocol: udp
        destination:
          port: 33434-33534

  - name: LOCAL-TO-SERVICE
    default_action: drop
    rules:
      - number: 10
        action: accept
        description: Allow VRRP to SERVICE
        protocol: "112"
        destination:
          address_group: VRRP_MULTICAST
      - number: 20
        action: accept
        description: Allow ICMP to SERVICE
        protocol: icmp
      - number: 25
        action: accept
        description: Allow UDP traceroute to SERVICE
        protocol: udp
        destination:
          port: 33434-33534

  - name: LOCAL-TO-INTERNAL
    default_action: drop
    rules:
      - number: 10
        action: accept
        description: Allow VRRP to INTERNAL
        protocol: "112"
        destination:
          address_group: VRRP_MULTICAST
      - number: 20
        action: accept
        description: Allow ICMP to INTERNAL
        protocol: icmp
      - number: 25
        action: accept
        description: Allow UDP traceroute to INTERNAL
        protocol: udp
        destination:
          port: 33434-33534

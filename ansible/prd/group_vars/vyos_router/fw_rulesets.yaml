---
fw_rulesets:
  - name: WAN-TO-LOCAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow VRRP from FW-WAN-NODES
        protocol: "112"
        source:
          address_group: FW-WAN-NODES
      - number: 20
        action: accept
        description: Allow ICMP from HOME-CLIENTS to FW-WAN-NODES
        protocol: icmp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: FW-WAN-NODES
      - number: 21
        action: accept
        description: Allow ICMP from HOME-CLIENTS to FW-WAN-VIP
        protocol: icmp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: FW-WAN-VIP
      - number: 30
        action: accept
        description: Allow UDP traceroute from HOME-CLIENTS to FW-WAN-NODES
        protocol: udp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: FW-WAN-NODES
          port: 33434-33534
      - number: 31
        action: accept
        description: Allow UDP traceroute from HOME-CLIENTS to FW-WAN-VIP
        protocol: udp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: FW-WAN-VIP
          port: 33434-33534
      - number: 100
        action: accept
        description: Allow SSH from HOME-CLIENTS to FW-WAN-NODES
        protocol: tcp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: FW-WAN-NODES
          port: 22

  - name: WAN-TO-DMZ
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow ICMP from HOME-CLIENTS to TAILSCALE-NODES
        protocol: icmp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: TAILSCALE-NODES
      - number: 20
        action: accept
        description: Allow UDP traceroute from HOME-CLIENTS to TAILSCALE-NODES
        protocol: udp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: TAILSCALE-NODES
          port: 33434-33534
      - number: 100
        action: accept
        description: Allow SSH from HOME-CLIENTS to TAILSCALE-NODES
        protocol: tcp
        source:
          network_group: HOME-CLIENTS
        destination:
          address_group: TAILSCALE-NODES
          port: 22

  - name: DMZ-TO-WAN
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow Tailscale control/DERP (TCP 443)
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          port: 443
      - number: 11
        action: accept
        description: Allow Proxmox API (TCP 8006) from TAILSCALE-NODES to PVE-NODES
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: PVE-NODES
          port: 8006
      - number: 12
        action: accept
        description: Allow SSH (TCP 22) from TAILSCALE-NODES to PVE-NODES
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: PVE-NODES
          port: 22
      - number: 20
        action: accept
        description: Allow Tailscale WireGuard tunnel (UDP 41641)
        protocol: udp
        source:
          address_group: TAILSCALE-NODES
          port: 41641
      - number: 30
        action: accept
        description: Allow Tailscale STUN (UDP 3478)
        protocol: udp
        source:
          address_group: TAILSCALE-NODES
        destination:
          port: 3478
      - number: 40
        action: accept
        description: Allow HTTPS to Alma Linux dnf repository from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: mirrors.almalinux.org
          port: 443
      - number: 41
        action: accept
        description: Allow HTTPS to Alma Linux repo from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: repo.almalinux.org
          port: 443
      - number: 42
        action: accept
        description: Allow HTTP to AlmaLinux mirror (ftp.udx.icscoe.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: ftp.udx.icscoe.jp
          port: 80
      - number: 43
        action: accept
        description: Allow HTTP to AlmaLinux mirror (ftp.iij.ad.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: ftp.iij.ad.jp
          port: 80
      - number: 44
        action: accept
        description: Allow HTTP to AlmaLinux mirror (ftp.jaist.ac.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: ftp.jaist.ac.jp
          port: 80
      - number: 45
        action: accept
        description: Allow HTTP to AlmaLinux mirror (ftp.sakura.ad.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: ftp.sakura.ad.jp
          port: 80
      - number: 46
        action: accept
        description: Allow HTTP to AlmaLinux mirror (ftp.riken.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: ftp.riken.jp
          port: 80
      - number: 47
        action: accept
        description: Allow HTTP to AlmaLinux mirror (ftp.yz.yamagata-u.ac.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: ftp.yz.yamagata-u.ac.jp
          port: 80
      - number: 48
        action: accept
        description: Allow HTTP to AlmaLinux mirror (mirrors.xtom.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: mirrors.xtom.jp
          port: 80
      - number: 49
        action: accept
        description: Allow HTTP to AlmaLinux mirror (alma.acidman.thelefty.org) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: alma.acidman.thelefty.org
          port: 80
      - number: 50
        action: accept
        description: Allow HTTPS to COPR repo config from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: copr.fedorainfracloud.org
          port: 443
      - number: 51
        action: accept
        description: Allow HTTPS to COPR package download from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: download.copr.fedorainfracloud.org
          port: 443
      - number: 52
        action: accept
        description: Allow HTTPS to AdGuard update check from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: static.adtidy.org
          port: 443
      - number: 53
        action: accept
        description: Allow HTTPS to AdGuard filter list from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: adguardteam.github.io
          port: 443
      - number: 54
        action: accept
        description: Allow HTTPS to GitHub from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: github.com
          port: 443
      - number: 55
        action: accept
        description: Allow HTTPS to GitHub release assets from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: objects.githubusercontent.com
          port: 443
      - number: 56
        action: accept
        description: Allow HTTPS to Lets Encrypt ACME API from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: acme-v02.api.letsencrypt.org
          port: 443
      - number: 57
        action: accept
        description: Allow HTTPS to Cloudflare API from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: api.cloudflare.com
          port: 443
      - number: 58
        action: accept
        description: Allow DNS to public resolvers from DNS-SERVERS for SSL cert renewal DNS challenge
        protocol: tcp_udp
        source:
          address_group: DNS-SERVERS
        destination:
          network_group: CLOUDFLARE-IPS
          port: 53
      - number: 59
        action: accept
        description: Allow HTTPS to easylist.to filter list from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: easylist.to
          port: 443
      - number: 60
        action: accept
        description: Allow HTTPS to ELRepo from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: www.elrepo.org
          port: 443
      - number: 61
        action: accept
        description: Allow HTTP to ELRepo baseurl from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: elrepo.org
          port: 80
      - number: 62
        action: accept
        description: Allow HTTP to ELRepo mirrorlist from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: mirrors.elrepo.org
          port: 80
      - number: 63
        action: accept
        description: Allow HTTP to ELRepo mirror (mirrors.coreix.net) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: mirrors.coreix.net
          port: 80
      - number: 64
        action: accept
        description: Allow HTTP to ELRepo mirror (mirror.rackspace.com) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: mirror.rackspace.com
          port: 80
      - number: 65
        action: accept
        description: Allow HTTP to ELRepo mirror (linux-mirrors.fnal.gov) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: linux-mirrors.fnal.gov
          port: 80
      - number: 66
        action: accept
        description: Allow HTTPS to MariaDB repository (ftp.yz.yamagata-u.ac.jp) from DNS-SERVERS
        protocol: tcp
        source:
          address_group: DNS-SERVERS
        destination:
          fqdn: ftp.yz.yamagata-u.ac.jp
          port: 443
      - number: 950
        action: drop
        description: Silently drop Tailscale captive portal probe (Tokyo DERP derp7e)
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          fqdn: derp7e.tailscale.com
          port: 80
      - number: 951
        action: drop
        description: Silently drop Tailscale captive portal probe (Tokyo DERP derp7f)
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          fqdn: derp7f.tailscale.com
          port: 80
      - number: 952
        action: drop
        description: Silently drop Tailscale captive portal probe (Tokyo DERP derp7g)
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          fqdn: derp7g.tailscale.com
          port: 80
      - number: 953
        action: drop
        description: Silently drop Tailscale captive portal probe (Tokyo DERP derp7h)
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          fqdn: derp7h.tailscale.com
          port: 80

  - name: DMZ-TO-LOCAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow VRRP from FW-DMZ-NODES
        protocol: "112"
        source:
          address_group: FW-DMZ-NODES
      - number: 20
        action: accept
        description: Allow ICMP from TAILSCALE-NODES to FW-DMZ-NODES
        protocol: icmp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: FW-DMZ-NODES
      - number: 30
        action: accept
        description: Allow UDP traceroute from TAILSCALE-NODES to FW-DMZ-NODES
        protocol: udp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: FW-DMZ-NODES
          port: 33434-33534
      - number: 100
        action: accept
        description: Allow SSH from TAILSCALE-NODES to FW-DMZ-NODES
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: FW-DMZ-NODES
          port: 22
      - number: 200
        action: accept
        description: Allow NTP from TAILSCALE-NODES to FW-DMZ-VIP
        protocol: udp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: FW-DMZ-VIP
          port: 123
      - number: 201
        action: accept
        description: Allow NTP from DNS-SERVERS to FW-DMZ-VIP
        protocol: udp
        source:
          address_group: DNS-SERVERS
        destination:
          address_group: FW-DMZ-VIP
          port: 123
      - number: 210
        action: accept
        description: Allow DNS from TAILSCALE-NODES to FW-DMZ-VIP
        protocol: tcp_udp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: FW-DMZ-VIP
          port: 53
      - number: 211
        action: accept
        description: Allow DNS from DNS-SERVERS to FW-DMZ-VIP
        protocol: tcp_udp
        source:
          address_group: DNS-SERVERS
        destination:
          address_group: FW-DMZ-VIP
          port: 53
      - number: 950
        action: drop
        description: Silently drop NAT-PMP from TAILSCALE-NODES
        protocol: udp
        source:
          address_group: TAILSCALE-NODES
        destination:
          port: 5351
      - number: 951
        action: drop
        description: Silently drop UPnP/SSDP from TAILSCALE-NODES
        protocol: udp
        source:
          address_group: TAILSCALE-NODES
        destination:
          port: 1900

  - name: DMZ-TO-INTERNAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow ICMP from TAILSCALE-NODES to NAS-SERVERS
        protocol: icmp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: NAS-SERVERS
      - number: 15
        action: accept
        description: Allow UDP traceroute from TAILSCALE-NODES to NAS-SERVERS
        protocol: udp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: NAS-SERVERS
          port: 33434-33534
      - number: 20
        action: accept
        description: Allow SSH from TAILSCALE-NODES to ZABBIX-SERVERS
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: ZABBIX-SERVERS
          port: 22
      - number: 30
        action: accept
        description: Allow SSH from TAILSCALE-NODES to ACCESS-SWITCHES
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: ACCESS-SWITCHES
          port: 22
      - number: 40
        action: accept
        description: Allow TCP/9999 from TAILSCALE-NODES to NAS-SERVERS
        protocol: tcp
        source:
          address_group: TAILSCALE-NODES
        destination:
          address_group: NAS-SERVERS
          port: 9999

  - name: INTERNAL-TO-WAN
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow ICMP to WAN from NAS-SERVERS
        protocol: icmp
        source:
          address_group: NAS-SERVERS
      - number: 200
        action: accept
        description: Allow HTTPS to api-aar.ugnas.com from NAS-SERVERS
        protocol: tcp
        source:
          address_group: NAS-SERVERS
        destination:
          port: 443

  - name: INTERNAL-TO-DMZ
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow DNS from ZABBIX-SERVERS to DNS-SERVERS
        protocol: tcp_udp
        source:
          address_group: ZABBIX-SERVERS
        destination:
          address_group: DNS-SERVERS
          port: 53
      - number: 11
        action: accept
        description: Allow DNS from NAS-SERVERS to DNS-SERVERS
        protocol: tcp_udp
        source:
          address_group: NAS-SERVERS
        destination:
          address_group: DNS-SERVERS
          port: 53
      - number: 20
        action: accept
        description: Allow HTTPS to DNS-SERVERS for repo mirror from ZABBIX-SERVERS
        protocol: tcp
        source:
          address_group: ZABBIX-SERVERS
        destination:
          address_group: DNS-SERVERS
          port: 443

  - name: INTERNAL-TO-LOCAL
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow NTP from ZABBIX-SERVERS to FW-INTERNAL-VIP
        protocol: udp
        source:
          address_group: ZABBIX-SERVERS
        destination:
          address_group: FW-INTERNAL-VIP
          port: 123
      - number: 20
        action: accept
        description: Allow NTP from NAS-SERVERS to FW-INTERNAL-VIP
        protocol: udp
        source:
          address_group: NAS-SERVERS
        destination:
          address_group: FW-INTERNAL-VIP
          port: 123
      - number: 950
        action: drop
        description: Silently drop NetBIOS Name Service broadcast from NAS-SERVERS
        protocol: udp
        source:
          address_group: NAS-SERVERS
        destination:
          port: 137
      - number: 951
        action: drop
        description: Silently drop NetBIOS Datagram broadcast from NAS-SERVERS
        protocol: udp
        source:
          address_group: NAS-SERVERS
        destination:
          port: 138

  - name: LOCAL-TO-WAN
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow NTP to WAN-GATEWAY
        protocol: udp
        destination:
          address_group: WAN-GATEWAY
          port: 123
      - number: 20
        action: accept
        description: Allow DNS to WAN-GATEWAY
        protocol: tcp_udp
        destination:
          address_group: WAN-GATEWAY
          port: 53
      - number: 30
        action: accept
        description: Allow HTTPS for image download
        protocol: tcp
        destination:
          fqdn: github.com
          port: 443
      - number: 31
        action: accept
        description: Allow HTTPS for image download (GitHub CDN)
        protocol: tcp
        destination:
          fqdn: objects.githubusercontent.com
          port: 443
      - number: 40
        action: accept
        description: Allow ICMP to WAN
        protocol: icmp
      - number: 45
        action: accept
        description: Allow UDP traceroute to WAN
        protocol: udp
        destination:
          port: 33434-33534
      - number: 50
        action: accept
        description: Allow VRRP to FW-WAN-NODES
        protocol: "112"
        destination:
          address_group: VRRP-MULTICAST

  - name: LOCAL-TO-DMZ
    default_action: drop
    default_log: true
    rules:
      - number: 10
        action: accept
        description: Allow VRRP to FW-DMZ-NODES
        protocol: "112"
        destination:
          address_group: VRRP-MULTICAST
      - number: 20
        action: accept
        description: Allow ICMP to DMZ
        protocol: icmp
      - number: 25
        action: accept
        description: Allow UDP traceroute to DMZ
        protocol: udp
        destination:
          port: 33434-33534

  - name: LOCAL-TO-SERVICE
    default_action: drop
    rules:
      - number: 10
        action: accept
        description: Allow VRRP to SERVICE
        protocol: "112"
        destination:
          address_group: VRRP-MULTICAST
      - number: 20
        action: accept
        description: Allow ICMP to SERVICE
        protocol: icmp
      - number: 25
        action: accept
        description: Allow UDP traceroute to SERVICE
        protocol: udp
        destination:
          port: 33434-33534

  - name: LOCAL-TO-INTERNAL
    default_action: drop
    rules:
      - number: 10
        action: accept
        description: Allow VRRP to INTERNAL
        protocol: "112"
        destination:
          address_group: VRRP-MULTICAST
      - number: 20
        action: accept
        description: Allow ICMP to INTERNAL
        protocol: icmp
      - number: 25
        action: accept
